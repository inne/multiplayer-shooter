<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>COD::BROWSER</title>
  <!-- Inline empty favicon to avoid a 404 on /favicon.ico when hosted. -->
  <link rel="icon" href="data:," />

  <!-- three.js 0.160.0 pinned via importmap. MUST come BEFORE the module script.
       Every JS module imports the bare specifier "three" so there is exactly ONE
       three.js instance across the app. The "three/addons/" PREFIX maps to the
       pinned examples/jsm/ tree, so EVERY addon used by the app resolves through
       this single entry — no per-file entries needed. In use today:
         postprocessing/EffectComposer.js, RenderPass.js, UnrealBloomPass.js,
         ShaderPass.js, OutputPass.js   (scene.js post stack)
         shaders/FXAAShader.js, VignetteShader.js                (scene.js)
         environments/RoomEnvironment.js                         (scene.js IBL)
         loaders/RGBELoader.js                                   (scene.js HDRI)
         loaders/GLTFLoader.js          (scene/weapons/enemies/pickups GLB load)
         utils/SkeletonUtils.js                          (enemies rigged clones)
       (OutlinePass.js / DRACOLoader.js would resolve the same way if added.) -->
  <!-- Trystero 0.21.8 (MIT) pinned via esm.sh, used by net.js/main.js ONLY for the
       room-based matchmaking SIGNALING over free public relays (Nostr default,
       with MQTT/torrent fallbacks). Game data still flows P2P over WebRTC. The
       version is PINNED (not floating): the makeAction API is the 0.21.x tuple
       shape ([send, get]) and changed across the 0.21 -> 0.25 boundary. The bare
       "trystero/<strategy>" specifiers below are mapped so the strategy modules
       can be swapped (relay-family fallback) without rewriting the URLs. main.js
       currently imports the full esm.sh URLs directly, which also works; these
       importmap entries provide the pinned bare-specifier form. -->
  <!-- CACHE-BUSTING (no build step, no service worker): every local module is
       imported via an "app/" bare specifier mapped here with a ?v= token. Bump
       APP_BUILD (the ?v= on all app/* entries below) on each deploy and the WHOLE
       module tree is refetched — relative imports can't carry a query, so routing
       them through the import map is the only single-knob way to bust the cache.
       BUMP THIS NUMBER (v=N) ON EVERY DEPLOY: -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://esm.sh/three@0.160.0",
      "three/addons/": "https://esm.sh/three@0.160.0/examples/jsm/",
      "trystero": "https://esm.sh/trystero@0.21.8",
      "trystero/nostr": "https://esm.sh/trystero@0.21.8/nostr",
      "trystero/mqtt": "https://esm.sh/trystero@0.21.8/mqtt",
      "trystero/torrent": "https://esm.sh/trystero@0.21.8/torrent",
      "app/main.js": "./js/main.js?v=1",
      "app/scene.js": "./js/scene.js?v=1",
      "app/player.js": "./js/player.js?v=1",
      "app/weapons.js": "./js/weapons.js?v=1",
      "app/enemies.js": "./js/enemies.js?v=1",
      "app/pickups.js": "./js/pickups.js?v=1",
      "app/hud.js": "./js/hud.js?v=1",
      "app/audio.js": "./js/audio.js?v=1",
      "app/net.js": "./js/net.js?v=1"
    }
  }
  </script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #0b0f12;
    }
    /* Full-screen canvas; the HUD (#hud-root) is layered above it by hud.js (z-index:10). */
    #game-canvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
      cursor: crosshair;
      touch-action: none;
    }
    /* hud.js authors everything inside #hud-root; we only declare the root here. */
    #hud-root {
      position: fixed;
      inset: 0;
    }
  </style>
</head>
<body>
  <canvas id="game-canvas"></canvas>
  <div id="hud-root"></div>

  <!-- Single module entry point, loaded via the versioned "app/" import map entry
       so the whole module tree is cache-busted by the ?v= token above. -->
  <script type="module">import 'app/main.js';</script>
</body>
</html>
