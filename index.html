<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tank Game — WF1 Single-Player Core</title>
  <style>
    :root { color-scheme: dark; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background: #14171b;
      color: #e6e6e6;
      font-family: system-ui, sans-serif;
      overflow: hidden;
    }
    /* Full-window canvas. */
    #game {
      display: block;
      width: 100vw;
      height: 100vh;
      background: #1b1f24;
      cursor: crosshair;
    }
    /* Lightweight overlay HUD (the canvas draws its own in-world HUD too). */
    #hud {
      position: fixed;
      left: 12px;
      bottom: 12px;
      font-size: 13px;
      opacity: .8;
      letter-spacing: .3px;
      pointer-events: none;
      text-shadow: 0 1px 2px rgba(0,0,0,.8);
    }
    #hud b { color: #ffd86b; }
    #status { color: #9fe0a0; }
  </style>
</head>
<body>
  <canvas id="game" width="960" height="672"></canvas>
  <div id="hud">
    <b>W/S</b> drive &nbsp; <b>A/D</b> turn &nbsp; <b>mouse</b> aim &nbsp;
    <b>click</b> fire &nbsp; <b>SPACE</b> handbrake &nbsp; <b>B</b> bomb &nbsp;|&nbsp; <span id="status"></span>
  </div>
  <script type="module" src="./js/main.js"></script>
</body>
</html>
