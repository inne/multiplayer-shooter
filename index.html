<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bomberman — Single-Player Core</title>
  <style>
    :root { color-scheme: dark; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      /* Dark letterbox bars shown around the aspect-locked canvas. */
      background: #0c0e11;
      color: #e6e6e6;
      font-family: system-ui, sans-serif;
      overflow: hidden;
    }
    /* Center the canvas; the body background fills the leftover bars. */
    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    /* Aspect-locked canvas (960:672): the largest such box that fits the window,
       so it never deforms — extra space becomes side/top borders. The drawing
       buffer stays 960x672; CSS just scales it uniformly. */
    #game {
      display: block;
      width: min(100vw, calc(100vh * 960 / 672));
      height: min(100vh, calc(100vw * 672 / 960));
      background: #1b1f24;
    }
    /* Lightweight overlay HUD (the canvas draws its own in-world HUD too). */
    #hud {
      position: fixed;
      left: 12px;
      bottom: 12px;
      font-size: 13px;
      opacity: .8;
      letter-spacing: .3px;
      pointer-events: none;
      text-shadow: 0 1px 2px rgba(0,0,0,.8);
    }
    #hud b { color: #ffd86b; }
    #status { color: #9fe0a0; }
  </style>
</head>
<body>
  <canvas id="game" width="960" height="672"></canvas>
  <div id="hud">
    <b>WASD / arrows</b> move &nbsp; <b>B</b> or <b>SPACE</b> bomb &nbsp; <b>R</b> restart &nbsp;|&nbsp; <span id="status"></span>
  </div>
  <script type="module" src="./js/main.js"></script>
</body>
</html>
